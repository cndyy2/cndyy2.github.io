<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <style>
        
      /* code CSS pour embellir les boutons du menu*/
      /* source : https://getcssscan.com/css-buttons-examples */
      .btnMenu {
        align-items: center;
        appearance: none;
        background-color: #FCFCFD;
        border-radius: 4px;
        border-width: 0;
        box-shadow: rgba(45, 35, 66, 0.4) 0 2px 4px,rgba(45, 35, 66, 0.3) 0 7px 13px -3px,#D6D6E7 0 -3px 0 inset;
        box-sizing: border-box;
        cursor: pointer;
        display: inline-flex;
        height: 48px;
        justify-content: center;
        line-height: 1;
        list-style: none;
        overflow: hidden;
        padding-left: 16px;
        padding-right: 16px;
        position: relative;
        text-align: left;
        text-decoration: none;
        transition: box-shadow .15s,transform .15s;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        white-space: nowrap;
        will-change: box-shadow,transform;
      }
      
      .btnMenu:focus {
        box-shadow: #D6D6E7 0 0 0 1.5px inset, rgba(45, 35, 66, 0.4) 0 2px 4px, rgba(45, 35, 66, 0.3) 0 7px 13px -3px, #D6D6E7 0 -3px 0 inset;
      }
      
      .btnMenu:hover {
        box-shadow: rgba(45, 35, 66, 0.4) 0 4px 8px, rgba(45, 35, 66, 0.3) 0 7px 13px -3px, #D6D6E7 0 -3px 0 inset;
        transform: translateY(-2px);
      }
      
      .btnMenu:active {
        box-shadow: #D6D6E7 0 3px 7px inset;
        transform: translateY(2px);
      }

    </style>
</head>

<body style="background-image: url('image.jpg'); height: 100%;" >

  <center><h1> La salle d'opération</h1> <br><br>
  <!-- source: https://www.w3schools.com/js/js_window_location.asp -->

  <button class="btnMenu" onclick="window.location.href='instruction.html'"><b>Instruction</b></button><br><br>
  <button class="btnMenu" onclick="window.location.href='parametres.html'"> <img src="https://cdn-icons-png.flaticon.com/512/563/563541.png" height="35px"> </button><br><br></center>


</body>
</html>
